<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
</head>
<body>

<div class="container mt-4">

  <div th:if="${users != null and not #lists.isEmpty(users)}">
    <h2>User List</h2>
    <p>Select a user to change their password.</p>
    <table class="table table-striped table-hover">
      <thead class="table-dark">
      <tr>
        <th>User ID</th>
        <th>Username</th>
        <th>Role</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="u : ${users}">
        <td th:text="${u.userId}"></td>
        <td th:text="${u.username}"></td>
        <td th:text="${u.role}"></td>
        <td>
          <a th:href="@{'/users/edit/' + ${u.userId}}" class="btn btn-primary btn-sm">Change Password</a>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div th:if="${user != null}">
    <h2>Change Password for '<span th:text="${user.username}">Username</span>'</h2>

    <form th:action="@{/users/update-password}" method="post" class="mt-3">

      <input type="hidden" id="userId" name="userId" th:value="${user.userId}" />

      <div class="mb-3">
        <label for="newPassword" class="form-label">New Password</label>
        <input type="password" class="form-control" id="newPassword" name="newPassword" placeholder="Enter new password" required>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm New Password</label>
        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
      </div>

      <button type="submit" class="btn btn-success">Update Password</button>
      <a th:href="@{/users/display}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
